<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AROHA — Chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #08080f;
        --surface: #0f0f18;
        --surface-2: #14141f;
        --surface-3: #1a1a28;
        --surface-4: #1f1f30;
        --border: rgba(255, 255, 255, 0.06);
        --border-light: rgba(255, 255, 255, 0.1);
        --accent: #7c6aff;
        --accent-dim: rgba(124, 106, 255, 0.12);
        --accent-glow: rgba(124, 106, 255, 0.28);
        --accent-2: #ff6ac1;
        --user-gradient: linear-gradient(140deg, #8b78ff 0%, #6451e8 100%);
        --text-primary: #eeeef8;
        --text-secondary: #a0a0be;
        --text-muted: #5a5a7a;
        --success: #4ade80;
        --font-display: "Syne", sans-serif;
        --font-body: "DM Sans", sans-serif;
        --nav-h: 58px;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
        background-size: 160px;
        opacity: 0.5;
      }

      /* ─── NAVBAR ─── */
      .navbar {
        height: var(--nav-h);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        background: rgba(8, 8, 15, 0.9);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        position: relative;
        z-index: 100;
        flex-shrink: 0;
        animation: fadeDown 0.4s ease both;
      }
      @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .nav-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }
      .nav-logo {
        width: 32px;
        height: 32px;
        background: var(--user-gradient);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 14px var(--accent-glow);
      }
      .nav-logo svg { width: 16px; height: 16px; fill: white; }
      .nav-wordmark {
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 1px;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
      }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        border-radius: 8px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-muted);
        transition: color 0.2s, background 0.2s;
      }
      .nav-link svg { width: 13px; height: 13px; fill: currentColor; }
      .nav-link:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); }
      .nav-link.active { color: var(--accent); background: rgba(124,106,255,0.1); }

      .nav-right { display: flex; align-items: center; gap: 8px; }
      .nav-btn {
        width: 32px; height: 32px;
        border-radius: 9px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        text-decoration: none;
        font-size: 14px;
        transition: border-color 0.2s, background 0.2s;
      }
      .nav-btn:hover { border-color: rgba(255,255,255,0.15); background: var(--surface-3); }
      .nav-btn svg { width: 14px; height: 14px; fill: var(--text-muted); }
      .nav-avatar { border-color: rgba(124,106,255,0.4); }

      /* ─── APP SHELL ─── */
      .app-shell {
        display: flex;
        flex: 1;
        overflow: hidden;
        position: relative;
        z-index: 1;
      }

      /* ─── CHAT AREA ─── */
      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
        position: relative;
      }
      .chat-area::before {
        content: "";
        position: absolute;
        top: 0; left: 50%;
        transform: translateX(-50%);
        width: 700px; height: 400px;
        background: radial-gradient(ellipse at top, rgba(124,106,255,0.05) 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }

      /* ─── TOPBAR ─── */
      .chat-topbar {
        padding: 12px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
        background: rgba(8,8,15,0.5);
        backdrop-filter: blur(10px);
        position: relative;
        z-index: 2;
      }
      .chat-bot-info { display: flex; align-items: center; gap: 12px; }
      .bot-avatar {
        width: 36px; height: 36px;
        border-radius: 11px;
        background: var(--user-gradient);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 14px var(--accent-glow);
      }
      .bot-avatar svg { width: 18px; height: 18px; fill: white; }
      .bot-name { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text-primary); }
      .bot-status {
        font-size: 11px; color: var(--success);
        display: flex; align-items: center; gap: 5px; margin-top: 1px;
      }
      .status-dot {
        width: 6px; height: 6px;
        background: var(--success);
        border-radius: 50%;
        box-shadow: 0 0 6px var(--success);
        animation: blink 2s infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
      .topbar-actions { display: flex; align-items: center; gap: 6px; }
      .topbar-btn {
        width: 32px; height: 32px;
        border-radius: 9px;
        background: transparent;
        border: 1px solid var(--border);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }
      .topbar-btn:hover { background: var(--surface-3); border-color: var(--border-light); }
      .topbar-btn svg { width: 14px; height: 14px; fill: var(--text-muted); }

      /* ─── MESSAGES SCROLL AREA ─── */
      .messages-wrap {
        flex: 1;
        overflow-y: auto;
        padding: 24px 0 8px;
        display: flex;
        flex-direction: column;
        position: relative;
        z-index: 1;
      }
      .messages-wrap::-webkit-scrollbar { width: 4px; }
      .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      .messages-inner {
        max-width: 760px;
        width: 100%;
        margin: 0 auto;
        padding: 0 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        flex: 1;
      }

      /* ─── WELCOME / EMPTY STATE ─── */
      .empty-chat {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
        flex: 1;
      }
      .empty-logo {
        width: 72px; height: 72px;
        border-radius: 22px;
        background: var(--user-gradient);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 32px var(--accent-glow);
        margin-bottom: 20px;
      }
      .empty-logo svg { width: 34px; height: 34px; fill: white; }
      .empty-title {
        font-family: var(--font-display);
        font-size: 22px; font-weight: 800;
        color: var(--text-primary);
        margin-bottom: 10px;
      }
      .empty-sub {
        font-size: 14px; color: var(--text-muted);
        max-width: 340px; line-height: 1.65;
        margin-bottom: 32px;
      }
      .starter-chips {
        display: flex; flex-wrap: wrap; gap: 8px;
        justify-content: center; max-width: 500px;
      }
      .chip {
        padding: 8px 16px;
        border-radius: 20px;
        background: var(--surface-2);
        border: 1px solid var(--border);
        font-size: 13px; color: var(--text-secondary);
        cursor: pointer;
        transition: border-color 0.2s, color 0.2s, background 0.2s;
      }
      .chip:hover {
        border-color: rgba(124,106,255,0.4);
        color: var(--accent);
        background: var(--accent-dim);
      }

      /* ─── MESSAGE BUBBLES ─── */
      .msg-row {
        display: flex; gap: 12px; align-items: flex-end;
        animation: msgFadeIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
      }
      @keyframes msgFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .msg-row.user { flex-direction: row-reverse; }

      .msg-avatar {
        width: 30px; height: 30px;
        border-radius: 9px;
        display: flex; align-items: center; justify-content: center;
        font-size: 13px; flex-shrink: 0;
      }
      .msg-avatar.bot-av {
        background: var(--user-gradient);
        box-shadow: 0 2px 10px var(--accent-glow);
      }
      .msg-avatar.bot-av svg { width: 15px; height: 15px; fill: white; }
      .msg-avatar.user-av {
        background: var(--surface-4);
        border: 1px solid var(--border-light);
      }

      .msg-body { display: flex; flex-direction: column; gap: 4px; max-width: 72%; }
      .msg-row.user .msg-body { align-items: flex-end; }

      .msg-label {
        font-size: 10.5px; font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase; letter-spacing: 0.07em;
        padding: 0 4px;
      }

      .bubble {
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 14px; line-height: 1.65;
        word-wrap: break-word;
        white-space: pre-wrap;
      }
      .bubble.bot {
        background: var(--surface-2);
        border: 1px solid var(--border);
        color: var(--text-primary);
        border-bottom-left-radius: 5px;
      }
      .bubble.user {
        background: var(--user-gradient);
        color: #fff;
        border-bottom-right-radius: 5px;
        box-shadow: 0 4px 20px rgba(124,106,255,0.3);
      }

      /* ─── TYPING INDICATOR ─── */
      .typing-indicator {
        display: none; align-items: flex-end; gap: 12px;
        animation: msgFadeIn 0.3s ease both;
      }
      .typing-indicator.visible { display: flex; }
      .typing-bubble {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 18px; border-bottom-left-radius: 5px;
        padding: 14px 18px;
        display: flex; gap: 5px; align-items: center;
      }
      .typing-bubble span {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.5;
        animation: typBounce 1.2s infinite;
      }
      .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
      .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
      @keyframes typBounce {
        0%, 60%, 100% { transform: translateY(0); }
        30%            { transform: translateY(-6px); opacity: 1; }
      }

      /* ─── ERROR BUBBLE ─── */
      .bubble.error {
        background: rgba(255, 80, 80, 0.08);
        border: 1px solid rgba(255, 80, 80, 0.2);
        color: #ff9090;
        border-bottom-left-radius: 5px;
      }

      /* ─── INPUT AREA ─── */
      .input-area {
        padding: 14px 24px 18px;
        position: relative; z-index: 2; flex-shrink: 0;
      }
      .input-outer { max-width: 760px; margin: 0 auto; }
      .input-card {
        background: var(--surface-2);
        border: 1px solid var(--border-light);
        border-radius: 18px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(124,106,255,0.04);
        transition: border-color 0.2s, box-shadow 0.2s;
        overflow: hidden;
      }
      .input-card:focus-within {
        border-color: rgba(124,106,255,0.35);
        box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 3px rgba(124,106,255,0.08);
      }
      .input-top {
        display: flex; align-items: flex-end; gap: 10px;
        padding: 12px 12px 10px 16px;
      }
      .input-top textarea {
        flex: 1;
        background: transparent; border: none; outline: none;
        color: var(--text-primary);
        font-family: var(--font-body);
        font-size: 14.5px; line-height: 1.55;
        resize: none; max-height: 180px; padding: 2px 0;
      }
      .input-top textarea::placeholder { color: var(--text-muted); }
      .send-btn {
        width: 38px; height: 38px;
        border-radius: 11px;
        background: var(--user-gradient);
        border: none;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; flex-shrink: 0;
        box-shadow: 0 4px 14px var(--accent-glow);
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .send-btn:hover  { transform: scale(1.08); box-shadow: 0 6px 20px rgba(124,106,255,0.5); }
      .send-btn:active { transform: scale(0.94); }
      .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
      .send-btn svg { width: 16px; height: 16px; fill: white; transform: translateX(1px); }
      .input-footer {
        display: flex; align-items: center; justify-content: space-between;
        padding: 6px 14px 10px;
        border-top: 1px solid var(--border);
      }
      .input-tools { display: flex; gap: 4px; }
      .tool-btn {
        width: 28px; height: 28px; border-radius: 8px;
        background: transparent; border: none;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: background 0.15s;
      }
      .tool-btn:hover { background: var(--surface-4); }
      .tool-btn svg { width: 14px; height: 14px; fill: var(--text-muted); }
      .input-hint { font-size: 11px; color: var(--text-muted); }
      .input-hint kbd {
        display: inline-flex; align-items: center;
        padding: 1px 5px; border-radius: 4px;
        background: var(--surface-3);
        border: 1px solid var(--border-light);
        font-family: var(--font-body); font-size: 10px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="/" class="nav-brand">
        <div class="nav-logo">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
        </div>
        <span class="nav-wordmark">AROHA</span>
      </a>
    </nav>

    <!-- APP SHELL -->
    <div class="app-shell">
      <main class="chat-area">
        <!-- TOPBAR -->
        <div class="chat-topbar">
          <div class="chat-bot-info">
            <div class="bot-avatar">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm1 14H7v-2h6v2zm2-4H7v-2h8v2zm0-4H7V6h8v2z"/></svg>
            </div>
            <div>
              <div class="bot-name">AROHA</div>
              <div class="bot-status">
                <span class="status-dot"></span>Online · Always ready
              </div>
            </div>
          </div>
          <div class="topbar-actions">
            <button class="topbar-btn" title="Clear chat" onclick="clearChat()">
              <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
            <button class="topbar-btn" title="Export" onclick="exportChat()">
              <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            </button>
          </div>
        </div>

        <!-- MESSAGES AREA -->
        <div class="messages-wrap" id="messagesWrap">
          <div class="messages-inner" id="messagesInner">

            <!-- WELCOME / EMPTY STATE -->
            <div class="empty-chat" id="emptyState">
              <div class="empty-logo">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm1 14H7v-2h6v2zm2-4H7v-2h8v2zm0-4H7V6h8v2z"/></svg>
              </div>
              <div class="empty-title">How can I help you today?</div>
            </div>

            <!-- TYPING INDICATOR -->
            <div class="typing-indicator" id="typingIndicator">
              <div class="msg-avatar bot-av">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>
              </div>
              <div class="typing-bubble">
                <span></span><span></span><span></span>
              </div>
            </div>

          </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
          <div class="input-outer">
            <div class="input-card">
              <div class="input-top">
                <textarea
                  id="msgInput"
                  placeholder="Message AROHA..."
                  rows="1"
                  autocomplete="off"
                  oninput="autoResize(this)"
                  onkeydown="handleKey(event)"
                ></textarea>
                <button id="sendBtn" class="send-btn" aria-label="Send" onclick="sendMessage()">
                  <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
              </div>
              <div class="input-footer">
                <div class="input-tools">
                  <button type="button" class="tool-btn" title="Attach file">
                    <svg viewBox="0 0 24 24"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
                  </button>
                  <button type="button" class="tool-btn" title="Emoji">
                    <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
                  </button>
                </div>
                <span class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for newline</span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:2000/Chatbot";

      // ── Helpers ──────────────────────────────────────────────────────────────

      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 180) + "px";
      }

      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function setPrompt(el) {
        const textarea = document.getElementById("msgInput");
        textarea.value = el.textContent.trim();
        textarea.focus();
        autoResize(textarea);
      }

      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        if (sidebar) sidebar.style.display = sidebar.style.display === "none" ? "" : "none";
      }

      function scrollToBottom() {
        const wrap = document.getElementById("messagesWrap");
        if (wrap) wrap.scrollTop = wrap.scrollHeight;
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      const BOT_SVG = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.07L2 22l4.93-1.37A9.94 9.94 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>`;

      // ── Render helpers ────────────────────────────────────────────────────────

      function appendUserBubble(text) {
        const inner = document.getElementById("messagesInner");
        const typing = document.getElementById("typingIndicator");
        const row = document.createElement("div");
        row.className = "msg-row user";
        row.innerHTML = `
          <div class="msg-avatar user-av">🧑</div>
          <div class="msg-body">
            <span class="msg-label">You</span>
            <p class="bubble user">${escapeHtml(text)}</p>
          </div>`;
        inner.insertBefore(row, typing);
      }

      function appendBotBubble(text, isError = false) {
        const inner = document.getElementById("messagesInner");
        const typing = document.getElementById("typingIndicator");
        const row = document.createElement("div");
        row.className = "msg-row bot";
        row.innerHTML = `
          <div class="msg-avatar bot-av">${BOT_SVG}</div>
          <div class="msg-body">
            <span class="msg-label">AROHA</span>
            <p class="bubble ${isError ? "error" : "bot"}">${escapeHtml(text)}</p>
          </div>`;
        inner.insertBefore(row, typing);
      }

      function setLoading(loading) {
        const typing  = document.getElementById("typingIndicator");
        const sendBtn = document.getElementById("sendBtn");
        const input   = document.getElementById("msgInput");
        typing.classList.toggle("visible", loading);
        sendBtn.disabled = loading;
        input.disabled   = loading;
      }

      function hideWelcome() {
        const empty = document.getElementById("emptyState");
        if (empty) empty.style.display = "none";
      }

      // ── Core send function ────────────────────────────────────────────────────

      async function sendMessage() {
        const input = document.getElementById("msgInput");
        const text  = input.value.trim();
        if (!text) return;

        hideWelcome();
        appendUserBubble(text);

        // Reset textarea
        input.value = "";
        input.style.height = "auto";

        setLoading(true);
        scrollToBottom();

        try {
          const headersList = {
            "Accept": "*/*",
            "User-Agent": "Thunder Client (https://www.thunderclient.com)"
          };

          const bodyContent = new FormData();
          bodyContent.append("message", text);

          const response = await fetch(API_URL, {
            method: "POST",
            body: bodyContent,
            headers: headersList
          });

          if (!response.ok) {
            throw new Error(`Server error: ${response.status} ${response.statusText}`);
          }

          const data = await response.text();
          appendBotBubble(data);

        } catch (err) {
          console.error("AROHA API error:", err);
          appendBotBubble(
            "Sorry, I couldn't reach the server. Please check your connection and try again.",
            true
          );
        } finally {
          setLoading(false);
          scrollToBottom();
          document.getElementById("msgInput").focus();
        }
      }

      // ── Utility actions ───────────────────────────────────────────────────────

      function clearChat() {
        document
          .getElementById("messagesInner")
          .querySelectorAll(".msg-row")
          .forEach(r => r.remove());
        const empty = document.getElementById("emptyState");
        if (empty) empty.style.display = "";
        document.getElementById("typingIndicator").classList.remove("visible");
      }

      function exportChat() {
        const rows  = document.querySelectorAll(".msg-row");
        const lines = [];
        rows.forEach(row => {
          const isUser  = row.classList.contains("user");
          const bubble  = row.querySelector(".bubble");
          if (bubble) {
            lines.push(`${isUser ? "You" : "AROHA"}: ${bubble.textContent.trim()}`);
          }
        });
        if (!lines.length) return;
        const blob = new Blob([lines.join("\n\n")], { type: "text/plain" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        a.href     = url;
        a.download = "AROHA_chat.txt";
        a.click();
        URL.revokeObjectURL(url);
      }
    </script>
  </body>
</html>
